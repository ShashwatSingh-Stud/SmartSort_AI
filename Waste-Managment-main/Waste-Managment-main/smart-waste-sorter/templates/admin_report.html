<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Citizen Report</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input,
        textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🚨 Report Garbage Issue</h2>

        <form action="/submit_report" method="POST" enctype="multipart/form-data">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="file" name="image" required>

            <input type="text" name="location" placeholder="Enter Location" required>

            <textarea name="description" placeholder="Describe the issue"></textarea>

            <button type="submit">Submit Report</button>
        </form>

        <br>
        <a href="/admin_reports">Go to Admin Panel</a>
    </div>

</body>

</html>
